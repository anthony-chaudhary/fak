<text x="40.0" y="678.0" font-size="11.5" fill="#5b6b82" text-anchor="start" font-weight="normal">saved = 0.9·read − 0.25·creation   •   baseline = input + read + creation   •   OBSERVED (provider) priced, never WITNESSED (fak)</text>
