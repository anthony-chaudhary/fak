<text x="640.0" y="132.0" font-size="17" fill="#14233b" text-anchor="start" font-weight="700">What fak itself changed</text>
<text x="640.0" y="152.0" font-size="12.5" fill="#5b6b82" text-anchor="start" font-weight="normal">the marginal delta vs plain claude</text>
<text x="640.0" y="192.0" font-size="13.5" fill="#14233b" text-anchor="start" font-weight="700">1 • Tool-floor prune  (token axis)</text>
<text x="640.0" y="211.0" font-size="12" fill="#5b6b82" text-anchor="start" font-weight="normal">131 unreachable tool defs dropped / 131 turns</text>
