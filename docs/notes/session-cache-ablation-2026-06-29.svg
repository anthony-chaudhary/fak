<text x="775.0" y="392.0" font-size="12.5" fill="#14233b" text-anchor="start" font-weight="normal">bad calls stopped before</text>
<text x="775.0" y="411.0" font-size="12.5" fill="#14233b" text-anchor="start" font-weight="normal">a wasted round-trip</text>
<text x="640.0" y="438.0" font-size="12" fill="#5b6b82" text-anchor="start" font-weight="normal">1,101 repaired in-flight + 3 denied</text>
<text x="640.0" y="456.0" font-size="12" fill="#5b6b82" text-anchor="start" font-weight="normal">= 87% of the 1,272 proposed calls</text>
