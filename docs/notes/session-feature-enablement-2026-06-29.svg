<text x="372.0" y="134.0" font-size="11.5" fill="#5b6b82" text-anchor="start" font-weight="700">DEFAULT</text>
<text x="470.0" y="134.0" font-size="11.5" fill="#5b6b82" text-anchor="start" font-weight="700">OPERATES ON</text>
<text x="648.0" y="134.0" font-size="11.5" fill="#5b6b82" text-anchor="start" font-weight="700">THIS SESSION</text>
<text x="872.0" y="134.0" font-size="11.5" fill="#5b6b82" text-anchor="start" font-weight="700">WHY</text>
<text x="44.0" y="165.0" font-size="13" fill="#14233b" text-anchor="start" font-weight="700">Provider prompt cache</text>
<text x="44.0" y="181.0" font-size="10.5" fill="#5b6b82" text-anchor="start" font-weight="normal" font-style="italic">byte-faithful passthrough</text>
