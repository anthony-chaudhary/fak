<text x="872.0" y="211.0" font-size="11" fill="#14233b" text-anchor="start" font-weight="normal">Real but tiny: ~0.1% of the headline. Only fak token</text>
<text x="872.0" y="226.0" font-size="11" fill="#14233b" text-anchor="start" font-weight="normal">saving we can see fired.</text>
<text x="44.0" y="257.0" font-size="13" fill="#14233b" text-anchor="start" font-weight="700">History compaction</text>
<text x="44.0" y="273.0" font-size="10.5" fill="#5b6b82" text-anchor="start" font-weight="normal" font-style="italic">budget 48k</text>
<rect x="372.0" y="248.0" width="30.4" height="18.0" rx="9" fill="#2c7a4b" /><text x="387.2" y="261.0" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="700">ON</text>
<text x="470.0" y="262.0" font-size="12" fill="#14233b" text-anchor="start" font-weight="normal">req.Raw</text>
<text x="648.0" y="262.0" font-size="12.5" fill="#d98c00" text-anchor="start" font-weight="700">idle · shed 0</text>
<text x="872.0" y="257.0" font-size="11" fill="#14233b" text-anchor="start" font-weight="normal">Under budget every turn — the uncached tail never sprawled</text>
<text x="872.0" y="272.0" font-size="11" fill="#14233b" text-anchor="start" font-weight="normal">past 48k. On, no work.</text>
