<text x="44.0" y="303.0" font-size="13" fill="#14233b" text-anchor="start" font-weight="700">Result elision</text>
<text x="44.0" y="319.0" font-size="10.5" fill="#5b6b82" text-anchor="start" font-weight="normal" font-style="italic">budget 16k · since 06-26</text>
<rect x="372.0" y="294.0" width="30.4" height="18.0" rx="9" fill="#2c7a4b" /><text x="387.2" y="307.0" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="700">ON</text>
<text x="470.0" y="308.0" font-size="12" fill="#14233b" text-anchor="start" font-weight="normal">req.Raw</text>
<text x="648.0" y="308.0" font-size="12.5" fill="#d98c00" text-anchor="start" font-weight="700">unmeasured</text>
<text x="872.0" y="303.0" font-size="11" fill="#14233b" text-anchor="start" font-weight="normal">No exit-summary line. Shrinks oversized tool_results in</text>
