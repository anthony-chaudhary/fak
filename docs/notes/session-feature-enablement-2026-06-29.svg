<text x="44.0" y="503.0" font-size="10.5" fill="#5b6b82" text-anchor="start" font-weight="normal" font-style="italic">hash-chained</text>
<rect x="372.0" y="478.0" width="30.4" height="18.0" rx="9" fill="#2c7a4b" /><text x="387.2" y="491.0" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="700">ON</text>
<text x="470.0" y="492.0" font-size="12" fill="#14233b" text-anchor="start" font-weight="normal">observe</text>
<text x="648.0" y="492.0" font-size="12.5" fill="#3b6fb0" text-anchor="start" font-weight="700">171 rows</text>
<text x="872.0" y="487.0" font-size="11" fill="#14233b" text-anchor="start" font-weight="normal">Tamper-evident trail (3,195 total). Observability, not a</text>
<text x="872.0" y="502.0" font-size="11" fill="#14233b" text-anchor="start" font-weight="normal">token saver.</text>
<text x="44.0" y="533.0" font-size="13" fill="#14233b" text-anchor="start" font-weight="700">In-kernel KV / paged-KV / evict</text>
<text x="44.0" y="549.0" font-size="10.5" fill="#5b6b82" text-anchor="start" font-weight="normal" font-style="italic">fak's own engine</text>
<rect x="372.0" y="524.0" width="37.6" height="18.0" rx="9" fill="#8a97a8" /><text x="390.8" y="537.0" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="700">N/A</text>
<text x="470.0" y="538.0" font-size="12" fill="#14233b" text-anchor="start" font-weight="normal">engine only</text>
<text x="648.0" y="538.0" font-size="12.5" fill="#8a97a8" text-anchor="start" font-weight="700">not in path</text>
<text x="872.0" y="533.0" font-size="11" fill="#14233b" text-anchor="start" font-weight="normal">Only when fak SERVES the model. Here the model runs on</text>
<text x="872.0" y="548.0" font-size="11" fill="#14233b" text-anchor="start" font-weight="normal">Anthropic's servers.</text>
<rect x="44.0" y="570.0" width="1092.0" height="52.0" rx="8" fill="#fbf6ec" stroke="#d98c00" stroke-opacity="0.4"/>
<text x="60.0" y="588.0" font-size="12.5" fill="#a86a00" text-anchor="start" font-weight="700">Why so little room for fak to cut tokens here:</text>
<text x="60.0" y="606.0" font-size="11.5" fill="#14233b" text-anchor="start" font-weight="normal">Claude Code sets its cache breakpoint near the END of the request, so the cached prefix is almost the whole prompt. fak refuses to rewrite that prefix (it would burst</text>
<text x="60.0" y="621.0" font-size="11.5" fill="#14233b" text-anchor="start" font-weight="normal">Anthropic's cache and cost MORE), so every fak byte-lever is confined to a small uncached tail. The provider cache already captured the big win; fak stays out of its way.</text>
</svg>