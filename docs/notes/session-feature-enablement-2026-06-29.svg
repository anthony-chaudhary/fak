<text x="44.0" y="395.0" font-size="13" fill="#14233b" text-anchor="start" font-weight="700">vDSO dedup</text>
<text x="44.0" y="411.0" font-size="10.5" fill="#5b6b82" text-anchor="start" font-weight="normal" font-style="italic">collapse identical calls</text>
<rect x="372.0" y="386.0" width="30.4" height="18.0" rx="9" fill="#2c7a4b" /><text x="387.2" y="399.0" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="700">ON</text>
<text x="470.0" y="400.0" font-size="12" fill="#14233b" text-anchor="start" font-weight="normal">tool-side</text>
<text x="648.0" y="400.0" font-size="12.5" fill="#8a97a8" text-anchor="start" font-weight="700">N/A axis</text>
<text x="872.0" y="395.0" font-size="11" fill="#14233b" text-anchor="start" font-weight="normal">On, but its in-kernel amplification axis 'does not apply'</text>
<text x="872.0" y="410.0" font-size="11" fill="#14233b" text-anchor="start" font-weight="normal">on the proxy path.</text>
<text x="44.0" y="441.0" font-size="13" fill="#14233b" text-anchor="start" font-weight="700">Adjudication floor</text>
<text x="44.0" y="457.0" font-size="10.5" fill="#5b6b82" text-anchor="start" font-weight="normal" font-style="italic">allow/deny/repair/quarantine</text>
<rect x="372.0" y="432.0" width="30.4" height="18.0" rx="9" fill="#2c7a4b" /><text x="387.2" y="445.0" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="700">ON</text>
<text x="470.0" y="446.0" font-size="12" fill="#14233b" text-anchor="start" font-weight="normal">every call</text>
<text x="648.0" y="446.0" font-size="12.5" fill="#1f9d74" text-anchor="start" font-weight="700">1,104 fixed</text>
<text x="872.0" y="441.0" font-size="11" fill="#14233b" text-anchor="start" font-weight="normal">3 denied + 1,101 repaired + 3 policy-blocked. fak's real</text>
<text x="872.0" y="456.0" font-size="11" fill="#14233b" text-anchor="start" font-weight="normal">work this session.</text>
