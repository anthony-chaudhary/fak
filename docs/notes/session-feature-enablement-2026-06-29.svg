<text x="470.0" y="170.0" font-size="12" fill="#14233b" text-anchor="start" font-weight="normal">provider prefix</text>
<text x="648.0" y="170.0" font-size="12.5" fill="#1f9d74" text-anchor="start" font-weight="700">the 25.5M saved</text>
<text x="872.0" y="165.0" font-size="11" fill="#14233b" text-anchor="start" font-weight="normal">Anthropic's cache. fak keeps the prefix byte-identical —</text>
<text x="872.0" y="180.0" font-size="11" fill="#14233b" text-anchor="start" font-weight="normal">can't & doesn't move it.</text>
