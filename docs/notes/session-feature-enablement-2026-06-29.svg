<rect x="372.0" y="340.0" width="30.4" height="18.0" rx="9" fill="#2c7a4b" /><text x="387.2" y="353.0" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="700">ON</text>
<text x="470.0" y="354.0" font-size="12" fill="#14233b" text-anchor="start" font-weight="normal">req.Raw</text>
<text x="648.0" y="354.0" font-size="12.5" fill="#d98c00" text-anchor="start" font-weight="700">unmeasured</text>
<text x="872.0" y="349.0" font-size="11" fill="#14233b" text-anchor="start" font-weight="normal">Stubs elided middle turns; cached prefix stays</text>
<text x="872.0" y="364.0" font-size="11" fill="#14233b" text-anchor="start" font-weight="normal">byte-identical. The real reducer.</text>
