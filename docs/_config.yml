# GitHub Pages configuration for the fak documentation site.
#
# Enable in repo Settings -> Pages: Source = "Deploy from a branch",
# Branch = main, Folder = /docs. The site then publishes at the `url` + `baseurl`
# below. Until Pages is enabled this file is inert (it does nothing on its own).
#
# SEO/AEO: jekyll-seo-tag emits <title>, <meta name="description">, canonical,
# Open Graph, Twitter Card, and JSON-LD structured data from each page's front
# matter; jekyll-sitemap generates /sitemap.xml automatically. Both are allow-listed
# on GitHub Pages. The pages-theme below invokes {% seo %} in its <head>.

title: "Netra Fused Agent Kernel (`fak`)"
description: >-
  Netra Fused Agent Kernel (`fak`): an in-process, default-deny permission gate for
  AI agents fused with an addressable, bit-exact KV cache. Prompt-injection and
  tool-poisoning containment plus cache-efficient self-hosted LLM agent fleets, in Go.
author: Anthony Chaudhary
lang: en

# Published location (GitHub project site for anthony-chaudhary/fak).
url: "https://anthony-chaudhary.github.io"
baseurl: "/fak"

theme: jekyll-theme-cayman

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# jekyll-seo-tag extras
social:
  name: Netra Fused Agent Kernel (`fak`)
  links:
    - "https://github.com/anthony-chaudhary/fak"
github:
  is_project_page: true
twitter:
  card: summary_large_image

# Site-wide Open Graph / Twitter card image (the social preview). Absolute raw URL
# so it resolves even though the Pages source root is /docs.
#
# scope must carry `type: pages` as well as the empty path: an empty-path scope with
# no type matches EVERY build context, including the synthesized page Jekyll builds
# when the cayman layout pulls in _includes/head-custom.html. Resolving front-matter
# defaults against that context re-enters frontmatter_defaults infinitely -> the
# "Liquid Exception: stack level too deep in /_layouts/default.html" SystemStackError
# that broke the Pages build the moment the first _includes file landed. `type: pages`
# still covers index.md + every docs/*.md page (where jekyll-seo-tag wants the OG
# image), but excludes the include context, so the recursion can't form.
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      image: "https://raw.githubusercontent.com/anthony-chaudhary/fak/main/visuals/social-preview.png"

# Keep build noise out of the published site (these are repo-ops files, not docs).
exclude:
  - "*.py"
  - "*.pdf"
  - benchmark/
  - benchmarking/
  - planning/
  - testing/
  - releases/
  - stable-releases/
  # Go-to-market distribution drafts (paste-ready Reddit/HN/X/YouTube posts, the
  # positioning brief, landscape research). These are launch ops, not reader docs:
  # indexing them creates duplicate content with the eventual external posts and
  # would surface strategic positioning. The work they distribute lives in the
  # real docs above; the drafts stay out of the index.
  - launch/
  # Frozen historical snapshots (e.g. the pre-rewrite README). They are kept for
  # provenance, not reading: their links point at a tree that has since moved, so
  # publishing them creates stale duplicate content that competes with the live
  # pages in search. Out of the index; reachable from git history if needed.
  - archive/
  # Vendor-facing pilot/rollout memos (Anthropic/OpenAI internal-pitch, managed
  # rollout). Strategic GTM positioning, not reader docs — indexing them would leak
  # positioning and create duplicate content with the eventual external materials,
  # the same reasoning as launch/.
  - vendor/
  # Internal RSI artifacts that are NOT linked from any front door: auto-generated
  # status/strategy snapshots a reader is not meant to land on cold. (The reader-
  # facing scorecards — code-quality, agent-readiness, demo-quality, … — stay
  # published and linked from INDEX.md; only these orphaned internal ones are cut.)
  - persona-scorecard/
  - BENCH-DX-SCORECARD.md
  - CODE-SLOP-SCORECARD.md
  - VENDOR-ADOPTION-SCORECARD.md
  - dispatch-status.md
