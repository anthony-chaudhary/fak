<text x="724" y="173" font-size="20" font-weight="800" fill="#1f2933">60.3x</text>
<text x="724" y="190" font-size="10.5" fill="#6b7280">net A/C</text>
<text x="28" y="346" font-size="11" fill="#6b7280">Apple M3 Pro (6P+6E, 36 GB unified, ~150 GB/s) · pure-Go forward · Q8_0   ·   arms B,C run live end-to-end; arm A computed from the measured curve + anchored to live</text>
