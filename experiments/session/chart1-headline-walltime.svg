<text x="238" y="250" font-size="10.5" fill="#6b7280" text-anchor="end">prefix x1 + clone + batched decode</text>
<rect x="250" y="220" width="174.3" height="30" rx="3" fill="#2f9e6f"/>
<text x="432.3" y="240" font-size="14" font-weight="700" fill="#2f9e6f">19 min</text>
