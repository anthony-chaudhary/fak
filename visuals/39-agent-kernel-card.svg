<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">fak agent kernel share card</title>
  <desc id="desc">A serious launch card for fak: Agents are programs. Give them permissions, quarantine, and proof.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.58" stop-color="#101827"/>
      <stop offset="1" stop-color="#172033"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000814" flood-opacity="0.32"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .eyebrow { fill: #66e3c4; font-size: 24px; font-weight: 700; }
      .headline { fill: #f8fbff; font-size: 74px; font-weight: 760; }
      .subhead { fill: #c8d3e5; font-size: 34px; font-weight: 500; }
      .small { fill: #94a3b8; font-size: 22px; font-weight: 560; }
      .label { fill: #edf5ff; font-size: 25px; font-weight: 760; }
      .detail { fill: #aab8cb; font-size: 19px; font-weight: 520; }
      .chip { fill: #d7ffef; font-size: 20px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <path d="M0 526 C170 484 292 562 450 526 C624 486 724 405 925 444 C1054 469 1134 528 1200 508 L1200 630 L0 630 Z" fill="#0e7490" opacity="0.16"/>
  <path d="M0 578 C148 552 298 596 466 568 C660 536 792 496 964 538 C1061 562 1126 588 1200 576 L1200 630 L0 630 Z" fill="#22c55e" opacity="0.10"/>

  <text x="76" y="96" class="sans eyebrow">fak / AGENT KERNEL</text>
  <text x="76" y="184" class="sans headline">Agents are programs.</text>
  <text x="76" y="240" class="sans subhead">Give them permissions, quarantine, and proof.</text>

  <g transform="translate(76 326)" filter="url(#shadow)">
    <rect x="0" y="0" width="262" height="136" rx="18" fill="#14243a" stroke="#34516d" stroke-width="2"/>
    <text x="28" y="52" class="sans label">model asks</text>
    <text x="28" y="86" class="sans detail">proposes a tool call</text>
    <text x="28" y="112" class="sans detail">from untrusted context</text>
  </g>

  <path d="M356 394 H430" stroke="#7dd3fc" stroke-width="7" stroke-linecap="round"/>
  <path d="M430 394 L408 381 V407 Z" fill="#7dd3fc"/>

  <g transform="translate(450 302)" filter="url(#shadow)">
    <rect x="0" y="0" width="300" height="204" rx="22" fill="#12312d" stroke="#66e3c4" stroke-width="3"/>
    <text x="30" y="52" class="sans label">fak decides</text>
    <text x="30" y="88" class="sans detail">policy deny</text>
    <text x="30" y="116" class="sans detail">result quarantine</text>
    <text x="30" y="144" class="sans detail">replayable evidence</text>
    <rect x="30" y="158" width="150" height="34" rx="17" fill="#134e4a"/>
    <text x="49" y="182" class="sans chip">not prompt text</text>
  </g>

  <path d="M770 394 H844" stroke="#fbbf24" stroke-width="7" stroke-linecap="round"/>
  <path d="M844 394 L822 381 V407 Z" fill="#fbbf24"/>

  <g transform="translate(864 326)" filter="url(#shadow)">
    <rect x="0" y="0" width="260" height="136" rx="18" fill="#2b1f22" stroke="#f59e0b" stroke-width="2"/>
    <text x="28" y="52" class="sans label">tools run</text>
    <text x="28" y="86" class="sans detail">only if admitted</text>
    <text x="28" y="112" class="sans detail">with reason codes</text>
  </g>

  <text x="76" y="560" class="sans small">Policy-denied actions cannot run. Suspicious results do not automatically enter context.</text>
  <text x="76" y="596" class="sans small">Run the no-key repro: go run ./cmd/fak agent --offline</text>
</svg>
