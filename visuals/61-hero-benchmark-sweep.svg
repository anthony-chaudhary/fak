<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="860" viewBox="0 0 1320 860" role="img" aria-labelledby="sw-title sw-desc">
  <title id="sw-title">fak — the agent kernel, the benchmark sweep</title>
  <desc id="sw-desc">An eight-panel benchmark sweep across serving efficiency, correctness and the security kernel, each panel a grouped bar chart with fak in green against one honest reference; the eighth panel is the single-stream fence where llama.cpp leads. Figures: 4.1x fleet serving, 86.7% KV hit, 6.95x RadixAttention, max|delta|=0 mid-run eviction, 7.50x exact token reuse, 2,849x in-process decide, injection quarantine, and 8.7 vs 17.3 tok/s decode.</desc>
