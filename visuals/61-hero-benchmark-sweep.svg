  <text x="56" y="96" class="ti">fak by the benchmarks — breadth, not a single number</text>
  <text x="56" y="124" class="sub">Eight axes spanning serving efficiency, correctness, and the security kernel — each fak figure (green) against one honest reference; the last</text>
  <text x="56" y="146" class="sub">panel is the single-stream fence fak does not target, where llama.cpp leads.</text>
