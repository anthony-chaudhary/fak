<svg id="my-svg" width="100%" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="max-width: 500px; background-color: white;" viewBox="0 0 500 500" role="graphics-document document" aria-roledescription="quadrantChart"><style>#my-svg{font-size:14px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#my-svg .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#my-svg .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#my-svg .error-icon{fill:hsl(220.5882352941, 100%, 98.3333333333%);}#my-svg .error-text{fill:rgb(8.5000000002, 5.7500000001, 0);stroke:rgb(8.5000000002, 5.7500000001, 0);}#my-svg .edge-thickness-normal{stroke-width:1px;}#my-svg .edge-thickness-thick{stroke-width:3.5px;}#my-svg .edge-pattern-solid{stroke-dasharray:0;}#my-svg .edge-thickness-invisible{stroke-width:0;fill:none;}#my-svg .edge-pattern-dashed{stroke-dasharray:3;}#my-svg .edge-pattern-dotted{stroke-dasharray:2;}#my-svg .marker{fill:#0b0b0b;stroke:#0b0b0b;}#my-svg .marker.cross{stroke:#0b0b0b;}#my-svg svg{font-size:14px;}#my-svg p{margin:0;}#my-svg .node .neo-node{stroke:hsl(40.5882352941, 60%, 83.3333333333%);}#my-svg [data-look="neo"].node rect,#my-svg [data-look="neo"].cluster rect,#my-svg [data-look="neo"].node polygon{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node path{stroke:url(#my-svg-gradient);stroke-width:1px;}#my-svg [data-look="neo"].node .outer-path{filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node .neo-line path{stroke:hsl(40.5882352941, 60%, 83.3333333333%);filter:none;}#my-svg [data-look="neo"].node circle{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].node circle .state-start{fill:#000000;}#my-svg [data-look="neo"].icon-shape .icon{fill:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg [data-look="neo"].icon-shape .icon-neo path{stroke:url(#my-svg-gradient);filter:drop-shadow( 1px 2px 2px rgba(185,185,185,1));}#my-svg :root{--mermaid-font-family:"trebuchet ms",verdana,arial,sans-serif;}</style><g/><g class="main"><g class="quadrants"><g class="quadrant"><rect x="263" y="45" width="232" height="212" fill="#DBF3E1"/><text x="0" y="0" fill="#1C5230" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(379, 50) rotate(0)">NET GAIN -- repays in 2-25 runs</text></g><g class="quadrant"><rect x="31" y="45" width="232" height="212" fill="#FFF3CC"/><text x="0" y="0" fill="#6B5410" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(147, 50) rotate(0)">scale-limited (pressure alone)</text></g><g class="quadrant"><rect x="31" y="257" width="232" height="212" fill="#FBDDDD"/><text x="0" y="0" fill="#6E1F1B" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(147, 262) rotate(0)">NET LOSS -- build never repays</text></g><g class="quadrant"><rect x="263" y="257" width="232" height="212" fill="#FFF3CC"/><text x="0" y="0" fill="#6B5410" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(379, 262) rotate(0)">pressure-limited (scale alone)</text></g></g><g class="border"><line x1="30" y1="45" x2="496" y2="45" style="stroke: rgb(91, 107, 123); stroke-width: 2;"/><line x1="495" y1="46" x2="495" y2="468" style="stroke: rgb(91, 107, 123); stroke-width: 2;"/><line x1="30" y1="469" x2="496" y2="469" style="stroke: rgb(91, 107, 123); stroke-width: 2;"/><line x1="31" y1="46" x2="31" y2="468" style="stroke: rgb(91, 107, 123); stroke-width: 2;"/><line x1="263" y1="46" x2="263" y2="468" style="stroke: rgb(175, 192, 206); stroke-width: 1;"/><line x1="32" y1="257" x2="494" y2="257" style="stroke: rgb(175, 192, 206); stroke-width: 1;"/></g><g class="data-points"><g class="data-point"><circle cx="327.96000000000004" cy="87.39999999999999" r="5" fill="#3B6FB5" stroke="#3B6FB5" stroke-width="0px"/><text x="0" y="0" fill="#1B3A66" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(327.96000000000004, 92.39999999999999) rotate(0)">N=1k 512k-ctx / 2 runs</text></g><g class="data-point"><circle cx="309.4" cy="426.6" r="5" fill="#3B6FB5" stroke="#3B6FB5" stroke-width="0px"/><text x="0" y="0" fill="#1B3A66" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(309.4, 431.6) rotate(0)">N=1k warm-KV / 7.5k runs</text></g><g class="data-point"><circle cx="411.47999999999996" cy="155.24" r="5" fill="#3B6FB5" stroke="#3B6FB5" stroke-width="0px"/><text x="0" y="0" fill="#1B3A66" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(411.47999999999996, 160.24) rotate(0)">N=10k / 2 runs</text></g><g class="data-point"><circle cx="318.67999999999995" cy="172.20000000000002" r="5" fill="#3B6FB5" stroke="#3B6FB5" stroke-width="0px"/><text x="0" y="0" fill="#1B3A66" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(318.67999999999995, 177.20000000000002) rotate(0)">N=1k / 23 runs</text></g><g class="data-point"><circle cx="216.6" cy="193.39999999999998" r="5" fill="#3B6FB5" stroke="#3B6FB5" stroke-width="0px"/><text x="0" y="0" fill="#1B3A66" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(216.6, 198.39999999999998) rotate(0)">N=100 / 234 runs</text></g><g class="data-point"><circle cx="58.839999999999996" cy="180.67999999999998" r="5" fill="#3B6FB5" stroke="#3B6FB5" stroke-width="0px"/><text x="0" y="0" fill="#1B3A66" font-size="12" dominant-baseline="hanging" text-anchor="middle" transform="translate(58.839999999999996, 185.67999999999998) rotate(0)">N=1 / 23k runs</text></g></g><g class="labels"><g class="label"><text x="0" y="0" fill="#1B3A66" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(147, 479) rotate(0)">few agents (N=1)</text></g><g class="label"><text x="0" y="0" fill="#1B3A66" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(379, 479) rotate(0)">fleet scale (N up to 10k)</text></g><g class="label"><text x="0" y="0" fill="#1B3A66" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(5, 363) rotate(-90)">warm KV / short ctx</text></g><g class="label"><text x="0" y="0" fill="#1B3A66" font-size="16" dominant-baseline="hanging" text-anchor="middle" transform="translate(5, 151) rotate(-90)">re-prefill pressure (miss-rate x context P)</text></g></g><g class="title"><text x="0" y="0" fill="#1B3A66" font-size="20" dominant-baseline="hanging" text-anchor="middle" transform="translate(250, 10) rotate(0)">The net-gain frontier -- when the inline / fused build repays</text></g></g></svg>