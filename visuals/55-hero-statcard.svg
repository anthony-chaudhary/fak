<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1080" viewBox="0 0 1440 1080" role="img" aria-labelledby="sc-title sc-desc">
  <title id="sc-title">fak benchmark breadth — a three-pillar capability sweep (serving, correctness, security kernel) with an honest single-stream fence</title>
  <desc id="sc-desc">fak owns the whole agent-infrastructure boundary. Breadth across three pillars — it does the SOTA serving stack's reuse, AND owns the safety/correctness boundary they don't, proven exact, at syscall speed. Every number traces to fak/BENCHMARK-AUTHORITY.md.</desc>
