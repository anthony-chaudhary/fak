<svg xmlns="http://www.w3.org/2000/svg" width="920" height="425" viewBox="0 0 920 425" font-size="12" style="font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;">
<rect width="920" height="425" fill="#ffffff"/>
<text x="20" y="34" fill="#57606a" font-size="13" font-weight="700" letter-spacing="0.06em">RSI LOOP — KEEP OR REVERT, CYCLE BY CYCLE</text>
