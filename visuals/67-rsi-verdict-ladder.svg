<text x="36" y="60" fill="#57606a" font-size="10">baseline (lru_hit_rate, the bar to beat)</text>
<rect x="313" y="50" width="11" height="11" rx="2" fill="#1a7f37"/>
<text x="329" y="60" fill="#57606a" font-size="10">KEEP — measured gain, suite green, truth clean</text>
<rect x="606" y="50" width="11" height="11" rx="2" fill="#bf8700"/>
<text x="622" y="60" fill="#57606a" font-size="10">REVERT — no non-forgeable gain</text>
<rect x="20" y="68" width="11" height="11" rx="2" fill="#bf3989"/>
<text x="36" y="78" fill="#57606a" font-size="10">ESCALATE — breaker tripped</text>
<text x="98" y="111" fill="#57606a" font-size="11" text-anchor="end">cycle 1: cache=4</text>
