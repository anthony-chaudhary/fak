<text x="20" y="327" fill="#57606a" font-size="11">Each row is one recursive-self-improvement cycle: a candidate is measured in an isolated worktree, and KEPT only when a</text>
<text x="20" y="343" fill="#57606a" font-size="11">witness the author did not write confirms a strictly-measured gain (lru_hit_rate, higher is better) with the suite green and</text>
<text x="20" y="359" fill="#57606a" font-size="11">the truth syscall clean — else REVERTed; a streak of non-keeps trips the breaker to ESCALATE. The coloured band over the</text>
<text x="20" y="375" fill="#57606a" font-size="11">shared baseline floor is the contested delta, tinted by the verdict. Same renderer as the context tape — a different</text>
<text x="20" y="391" fill="#57606a" font-size="11">producer.</text>
