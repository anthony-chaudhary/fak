<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">When does the reuse win actually kick in?</title>
  <desc id="desc">A visual guide showing when fak's performance benefits kick in based on agents, turns, and shared setup size.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7faf9"/>
      <stop offset="50%" stop-color="#eef5f6"/>
      <stop offset="100%" stop-color="#faf4ee"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#14202b" flood-opacity="0.13"/>
    </filter>
    <style>
      .title { font: 900 48px "Segoe UI", Arial, sans-serif; fill: #14202b; }
      .subtitle { font: 400 20px "Segoe UI", Arial, sans-serif; fill: #405063; }
      .cardTitle { font: 800 22px "Segoe UI", Arial, sans-serif; fill: #1b2733; }
      .big { font: 900 42px "Segoe UI", Arial, sans-serif; fill: #17202a; }
      .label { font: 700 16px "Segoe UI", Arial, sans-serif; fill: #314153; }
      .body { font: 400 15px "Segoe UI", Arial, sans-serif; fill: #415266; }
      .small { font: 400 13px "Segoe UI", Arial, sans-serif; fill: #5b6a7a; }
      .tiny { font: 700 12px "Segoe UI", Arial, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .card { fill: #ffffff; stroke: #d9e1e8; stroke-width: 1.5; }
      .win { fill: #edf7f0; stroke: #85bc98; }
      .loss { fill: #faeef3; stroke: #cf92b0; }
      .neutral { fill: #eef3f6; stroke: #d8e1e8; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect x="38" y="28" width="1524" height="944" rx="8" fill="#ffffff" opacity="0.62"/>

  <text x="72" y="88" class="title">When does the reuse win actually kick in?</text>
  <text x="74" y="125" class="subtitle">You need shared work to reuse. Here's when the benefit is positive, marginal, or negative.</text>

  <!-- Main rule card -->
  <rect x="72" y="160" width="1456" height="100" rx="8" fill="#17202a"/>
  <text x="98" y="195" class="tiny">THE PLAIN RULE</text>
  <text x="98" y="235" class="cardTitle" style="fill:#ffffff; font-size:24px;">You need 2+ things that share a prompt worth reusing + many turns</text>
  <text x="98" y="260" class="tiny" style="fill:#dce9ef;">Below that: zero or negative benefit. Above that: benefit grows with turns and agents.</text>

  <!-- Three columns for different scenarios -->
  <g filter="url(#shadow)">
    <!-- Loss scenario -->
    <rect x="58" y="290" width="460" height="340" rx="8" class="loss"/>
    <rect x="58" y="290" width="460" height="45" rx="8" fill="#cf5a5a"/>
    <text x="78" y="320" class="tiny">SINGLE AGENT, SHORT TASK</text>

    <text x="78" y="380" class="cardTitle">❌ Zero or negative benefit</text>

    <text x="78" y="430" class="label">Typical scenario:</text>
    <text x="78" y="460" class="body">• 1 agent asking 1-2 questions</text>
    <text x="78" y="485" class="body">• Small prompt (under 100 tokens)</text>
    <text x="78" y="510" class="body">• No shared prefix to reuse</text>

    <text x="78" y="560" class="label">Why:</text>
    <text x="78" y="590" class="body">Nothing to reuse. Overhead of the</text>
    <text x="78" y="615" class="body">kernel outweighs any savings.</text>
  </g>

  <!-- Neutral scenario -->
  <g filter="url(#shadow)">
    <rect x="570" y="290" width="460" height="340" rx="8" class="neutral"/>
    <rect x="570" y="290" width="460" height="45" rx="8" fill="#6a7685"/>
    <text x="590" y="320" class="tiny">FEW AGENTS, FEW TURNS</text>

    <text x="590" y="380" class="cardTitle">~ Break-even</text>

    <text x="590" y="430" class="label">Typical scenario:</text>
    <text x="590" y="460" class="body">• 2-3 agents, 3-5 turns each</text>
    <text x="590" y="485" class="body">• Moderate prompt (100-500 tokens)</text>
    <text x="590" y="510" class="body">• Some shared setup</text>

    <text x="590" y="560" class="label">Result:</text>
    <text x="590" y="590" class="body">Small win or break-even. Not the</text>
    <text x="590" y="615" class="body">primary use case.</text>
  </g>

  <!-- Win scenario -->
  <g filter="url(#shadow)">
    <rect x="1082" y="290" width="460" height="340" rx="8" class="win"/>
    <rect x="1082" y="290" width="460" height="45" rx="8" fill="#2e8b57"/>
    <text x="1102" y="320" class="tiny">MANY AGENTS, MANY TURNS</text>

    <text x="1102" y="380" class="cardTitle">✅ Strong benefit</text>

    <text x="1102" y="430" class="label">Typical scenario:</text>
    <text x="1102" y="460" class="body">• 5-100 agents, 10-1000 turns</text>
    <text x="1102" y="485" class="body">• Large shared prefix (500+ tokens)</text>
    <text x="1102" y="510" class="body">• Long-running sessions</text>

    <text x="1102" y="560" class="label">Result:</text>
    <text x="1102" y="590" class="body">Big win. 10-60× vs naive,</text>
    <text x="1102" y="615" class="body">1.5-4× vs tuned stack.</text>
  </g>

  <!-- Threshold examples -->
  <rect x="72" y="660" width="1456" height="280" rx="8" class="card"/>
  <text x="98" y="700" class="cardTitle">Crossover points (measured on small models, ratios are signal)</text>

  <g>
    <rect x="98" y="730" width="440" height="90" rx="4" class="neutral"/>
    <text x="112" y="760" class="label">By turns:</text>
    <text x="112" y="790" class="body">Ahead within ~3 turns (~9× vs naive)</text>
    <text x="112" y="815" class="body">Widens to ~60× by 50 turns</text>
  </g>

  <g>
    <rect x="560" y="730" width="440" height="90" rx="4" class="neutral"/>
    <text x="574" y="760" class="label">By agents:</text>
    <text x="574" y="790" class="body">Zero with 1 agent, positive at 2nd</text>
    <text x="574" y="815" class="body">Grows to 1000s of calls saved at scale</text>
  </g>

  <g>
    <rect x="1022" y="730" width="470" height="90" rx="4" class="win"/>
    <text x="1036" y="760" class="label">Frontier target:</text>
    <text x="1036" y="790" class="body">10,000 × 10,000 "agent city"</text>
    <text x="1036" y="815" class="body">Design direction, not measured</text>
  </g>

  <rect x="98" y="840" width="1390" height="80" rx="4" class="loss"/>
  <text x="112" y="870" class="label">⚠️ Write-heavy fleets: WARNING</text>
  <text x="112" y="900" class="body">Cross-agent sharing flips to net loss with >~1% write rate (writes invalidate broadly). This is for read-heavy fleets only.</text>

  <!-- Bottom summary -->
  <rect x="72" y="960" width="1456" height="40" rx="8" fill="#17202a"/>
  <text x="98" y="988" class="tiny" style="fill:#dce9ef;">Plain rule: need ≥2 agents OR ≥2 turns AND a shared prompt worth reusing. For single short tasks, use the engine directly.</text>
</svg>
