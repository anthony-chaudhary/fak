<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">SOTA Comparison: Stateful vs Stateless Approaches</title>
  <desc id="desc">A visual comparison of three approaches: stateless (re-send everything, no cache), tuned SOTA engines (KV cache, prefix sharing), and fak (cache + policy-driven governance).</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7faf9"/>
      <stop offset="50%" stop-color="#eef5f6"/>
      <stop offset="100%" stop-color="#faf4ee"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#14202b" flood-opacity="0.13"/>
    </filter>
    <style>
      .title { font: 900 48px "Segoe UI", Arial, sans-serif; fill: #14202b; }
      .subtitle { font: 400 20px "Segoe UI", Arial, sans-serif; fill: #405063; }
      .section { font: 800 18px "Segoe UI", Arial, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .cardTitle { font: 800 22px "Segoe UI", Arial, sans-serif; fill: #1b2733; }
      .big { font: 900 42px "Segoe UI", Arial, sans-serif; fill: #17202a; }
      .label { font: 700 16px "Segoe UI", Arial, sans-serif; fill: #314153; }
      .body { font: 400 15px "Segoe UI", Arial, sans-serif; fill: #415266; }
      .small { font: 400 13px "Segoe UI", Arial, sans-serif; fill: #5b6a7a; }
      .tiny { font: 700 12px "Segoe UI", Arial, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .card { fill: #ffffff; stroke: #d9e1e8; stroke-width: 1.5; }
      .muted { fill: #eef3f6; stroke: #d8e1e8; }
      .highlight { fill: #edf7f0; stroke: #85bc98; }
      .warn { fill: #fff5e8; stroke: #dfbd78; }
    </style>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>
  <rect x="38" y="28" width="1524" height="1144" rx="8" fill="#ffffff" opacity="0.62"/>

  <text x="72" y="88" class="title">SOTA Comparison: What fak actually compares against</text>
  <text x="74" y="125" class="subtitle">Both SOTA engines and fak use KV cache. The difference is the governance layer, not the caching.</text>

  <!-- Three columns comparison -->
  <g filter="url(#shadow)">
    <!-- Column 1: Stateless (no cache) -->
    <rect x="58" y="170" width="440" height="480" rx="8" class="card"/>
    <rect x="58" y="170" width="440" height="50" rx="8" fill="#6a7685"/>
    <text x="78" y="202" class="tiny">BASELINE: STATELESS (NO CACHE)</text>

    <text x="78" y="270" class="cardTitle">Re-send everything, every turn</text>

    <text x="78" y="330" class="label">What happens:</text>
    <text x="78" y="360" class="body">Turn 1: Send [system + tools + user]</text>
    <text x="78" y="385" class="body">Turn 2: Send [system + tools + user +</text>
    <text x="78" y="408" class="body">         assistant + result]</text>
    <text x="78" y="433" class="body">Turn 3: Send [system + tools + user +</text>
    <text x="78" y="456" class="body">         assistant + result + ...]</text>

    <text x="78" y="510" class="label">Cache behavior:</text>
    <text x="78" y="540" class="body" style="fill:#cf5a5a;">❌ No KV persistence</text>
    <text x="78" y="565" class="body">Re-prefill entire history every turn</text>
    <text x="78" y="590" class="body">O(T²) cost as conversation grows</text>

    <text x="78" y="640" class="label">Common in:</text>
    <text x="78" y="670" class="body">Simple scripts, basic APIs, tutorials</text>
  </g>

  <!-- Arrow -->
  <path d="M510 410 L540 410" stroke="#8b98a6" stroke-width="3"/>
  <path d="M540 410 L532 402 L532 418 Z" fill="#8b98a6"/>

  <!-- Column 2: SOTA Tuned -->
  <g filter="url(#shadow)">
    <rect x="550" y="170" width="440" height="480" rx="8" class="card"/>
    <rect x="550" y="170" width="440" height="50" rx="8" fill="#1c7c92"/>
    <text x="570" y="202" class="tiny">SOTA: TUNED SERVING ENGINE</text>

    <text x="570" y="270" class="cardTitle">KV cache + prefix sharing</text>

    <text x="570" y="330" class="label">What happens:</text>
    <text x="570" y="360" class="body">Turn 1: Prefill [system + tools + user]</text>
    <text x="570" y="385" class="body">Turn 2: Reuse KV + prefill [new part]</text>
    <text x="570" y="408" class="body">Turn 3: Reuse KV + prefill [new part]</text>
    <text x="570" y="433" class="body">...</text>

    <text x="570" y="490" class="label">Cache behavior:</text>
    <text x="570" y="520" class="body" style="fill:#2e8b57;">✅ RadixAttention (SGLang)</text>
    <text x="570" y="545" class="body">✅ Automatic Prefix Caching (vLLM)</text>
    <text x="570" y="570" class="body">✅ Prompt caching (OpenAI, etc.)</text>

    <text x="570" y="620" class="label">Eviction policy:</text>
    <text x="570" y="650" class="body">LRU — only when memory pressure</text>

    <text x="570" y="700" class="label">Examples:</text>
    <text x="570" y="730" class="body">llama.cpp, vLLM, SGLang, Ollama</text>
  </g>

  <!-- Arrow -->
  <path d="M1002 410 L1032 410" stroke="#8b98a6" stroke-width="3"/>
  <path d="M1032 410 L1024 402 L1024 418 Z" fill="#8b98a6"/>

  <!-- Column 3: fak -->
  <g filter="url(#shadow)">
    <rect x="1042" y="170" width="500" height="480" rx="8" class="card"/>
    <rect x="1042" y="170" width="500" height="50" rx="8" fill="#2e8b57"/>
    <text x="1062" y="202" class="tiny">FAK: CACHE + POLICY GOVERNANCE</text>

    <text x="1062" y="270" class="cardTitle">Same cache, plus safety layer</text>

    <text x="1062" y="330" class="label">What happens:</text>
    <text x="1062" y="360" class="body">Same KV reuse as SOTA (86.7% hit rate)</text>
    <text x="1062" y="385" class="body" style="fill:#2e8b57;">+ Permission gate before tools</text>
    <text x="1062" y="410" class="body" style="fill:#2e8b57;">+ Quarantine for poisoned results</text>
    <text x="1062" y="435" class="body" style="fill:#2e8b57;">+ Policy-driven invalidation</text>

    <text x="1062" y="490" class="label">Cache behavior:</text>
    <text x="1062" y="520" class="body">✅ Implements RadixAttention algorithm</text>
    <text x="1062" y="545" class="body">✅ Same hit rate as SGLang</text>
    <text x="1062" y="570" class="body">✅ Plus: evict by policy (not just LRU)</text>

    <text x="1062" y="620" class="label">What's different:</text>
    <text x="1062" y="650" class="body">Evict when quarantined</text>
    <text x="1062" y="675" class="body">Evict on scope change</text>
    <text x="1062" y="700" class="body">Evict on write invalidation</text>
  </g>

  <!-- Bottom comparison box -->
  <rect x="72" y="680" width="1456" height="180" rx="8" class="highlight"/>
  <text x="98" y="720" class="cardTitle">Performance comparison on 50×5 agent session</text>

  <g>
    <text x="98" y="770" class="label">vs Stateless:</text>
    <text x="240" y="770" class="big">1.5–4×</text>
    <text x="400" y="770" class="body">(vs tuned SOTA)</text>
  </g>

  <g>
    <text x="98" y="820" class="label">vs Tuned SOTA:</text>
    <text x="300" y="820" class="big">1.5–4×</text>
    <text x="440" y="820" class="body">(marginal gain from fused serving)</text>
  </g>

  <text x="800" y="770" class="label">Key insight:</text>
  <text x="800" y="800" class="body">SOTA already captures most reuse wins via prefix caching. fak's contribution</text>
  <text x="800" y="820" class="body">is the governance layer, not the cache itself.</text>

  <!-- SOTA features table -->
  <rect x="72" y="890" width="1456" height="260" rx="8" class="muted"/>
  <text x="98" y="930" class="cardTitle">What SOTA already does (and fak respects)</text>

  <g>
    <rect x="98" y="960" width="440" height="80" rx="4" fill="#ffffff" stroke="#d8e1e8"/>
    <text x="112" y="990" class="label">✅ KV cache / prefix reuse</text>
    <text x="112" y="1015" class="small">vLLM, SGLang, OpenAI — all ship this</text>
  </g>

  <g>
    <rect x="560" y="960" width="440" height="80" rx="4" fill="#ffffff" stroke="#d8e1e8"/>
    <text x="574" y="990" class="label">✅ Raw throughput optimization</text>
    <text x="574" y="1015" class="small">llama.cpp, vLLM — GPU-focused speed</text>
  </g>

  <g>
    <rect x="1022" y="960" width="470" height="80" rx="4" fill="#ffffff" stroke="#d8e1e8"/>
    <text x="1036" y="990" class="label">✅ Batched inference</text>
    <text x="1036" y="1015" class="small">Process multiple requests in parallel</text>
  </g>

  <g>
    <rect x="98" y="1060" width="700" height="70" rx="4" fill="#ffffff" stroke="#d8e1e8"/>
    <text x="112" y="1090" class="label">❌ Policy-driven governance (what fak adds)</text>
    <text x="112" y="1115" class="small">Permission gates, quarantine, scoped invalidation, admission control</text>
  </g>

  <g>
    <rect x="820" y="1060" width="670" height="70" rx="4" class="warn"/>
    <text x="834" y="1090" class="label">⚠️ SOTA doesn't own these questions:</text>
    <text x="834" y="1115" class="small">"Is this action allowed?" "Can this result enter memory?" "Is this reuse still legal?"</text>
  </g>

  <text x="72" y="1170" class="small">See fak/BENCHMARK-AUTHORITY.md for all benchmark numbers with traceability to commits and artifacts.</text>
</svg>
