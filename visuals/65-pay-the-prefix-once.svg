<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="740" viewBox="0 0 1600 740" role="img" aria-labelledby="t d">
  <title id="t">Pay the shared prefix once</title>
  <desc id="d">A fleet of 5 agents over 50 turns gives 250 chances to re-read the shared system-prompt-and-tools setup. A naive loop pays for that setup 250 times, a tuned warm cache 5 times (once per agent), and fak once for the whole fleet, cloned bit-identically. The measured headline is 4.1 times cheaper than a tuned warm cache and 62.0 times fewer prefill tokens than naive.</desc>
  <defs>
    <style>
      .sans{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
      .eyebrow{fill:#5b6a7a;font-size:24px;font-weight:700;letter-spacing:.04em}
      .sub{fill:#46586a;font-size:27px;font-weight:600}
      .lane{fill:#14202b;font-size:31px;font-weight:700}
      .lanesub{fill:#5b6a7a;font-size:21px;font-weight:500}
      .big{font-size:60px;font-weight:800}
      .head{font-size:30px;font-weight:800}
    </style>
  </defs>

  <rect width="1600" height="740" fill="#ffffff"/>
  <text x="80" y="58" class="sans eyebrow">ADDRESSABLE KV CACHE · MORE AGENTS → MORE REUSE</text>
  <text x="80" y="112" class="sans sub">5 agents × 50 turns = 250 chances to re-read the shared setup (system prompt + tools)</text>

  <!-- how many times each pays for that setup block -->
  <g>
    <text x="80" y="200" class="sans lane">naive · re-prefills the setup</text>
    <text x="80" y="231" class="sans lanesub">every turn, every agent — pays the setup on each of the 250</text>
    <rect x="600" y="172" width="640" height="40" rx="8" fill="#e0625b"/>
    <text x="1520" y="216" class="sans big" fill="#a3322c" text-anchor="end">250×</text>
  </g>
  <g>
    <text x="80" y="345" class="sans lane">tuned · warm cache per agent</text>
    <text x="80" y="376" class="sans lanesub">a per-agent prefix cache — pays once for each of the 5 agents</text>
    <rect x="600" y="317" width="128" height="40" rx="8" fill="#e0a93f"/>
    <text x="1520" y="361" class="sans big" fill="#b5792b" text-anchor="end">5×</text>
  </g>
  <g>
    <text x="80" y="490" class="sans lane">fak · prefill once, clone it</text>
    <text x="80" y="521" class="sans lanesub">one prefill for the whole fleet, cloned bit-identical into every agent</text>
    <rect x="600" y="462" width="26" height="40" rx="8" fill="#3fa45f"/>
    <text x="1520" y="506" class="sans big" fill="#1f6b46" text-anchor="end">1×</text>
  </g>

  <line x1="80" y1="578" x2="1520" y2="578" stroke="#e0e6ec" stroke-width="2"/>
  <text x="80" y="636" class="sans head"><tspan fill="#1f6b46">4.1×</tspan><tspan fill="#46586a"> vs a tuned warm cache</tspan><tspan fill="#9aa6b2">   ·   </tspan><tspan fill="#1f6b46">62.0×</tspan><tspan fill="#46586a"> fewer prefill tokens vs naive</tspan></text>
  <text x="80" y="684" class="sans lanesub" font-size="23">A read-heavy win: if agents keep writing the shared state, even ~1% writes can erase it.</text>
</svg>
