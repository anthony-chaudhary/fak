name: capacity-feed

# Publish fak's CAPACITY surface to Slack #capacity (C0BDNU04JDP, the scoreboard
# workspace T0BDEJF1HGB). Lab/account capacity lives on the private bridge and the
# #node-usage feed; this public CI job reports the GitHub-side demand pressure it can
# witness with GITHUB_TOKEN: total open issues, urgent P0/P1 load, new 24h arrivals,
# and stale >7d backlog. Those four numbers make the card an operator triage signal
# instead of a raw issue-count heartbeat.
#
# This is a SLACK STATUS feeder (cadence -> channel post), the dual of
# steering-guard.yml — NOT an issue feeder like score-/bench-/gate-signal.yml
# (those turn a regression into a GitHub issue for the dispatch loop and post
# nothing to Slack). Do not conflate the two.
#
# Posting is GATED on the FAK_SCOREBOARD_TOKEN secret being present. Without it the
# job runs in --dry-run and writes the card to the step summary, so a fork or a
# secret-less run never hard-fails — it just shows what WOULD post.
#
# OPERATOR STEP (one-time): add the repo secret FAK_SCOREBOARD_TOKEN (the
# scoreboard-workspace bot token — the same value in the gitignored
# .env.slack.local) under Settings -> Secrets and variables -> Actions. The channel
# #capacity (C0BDNU04JDP) is the built-in default; override with the
# FAK_CAPACITY_CHANNEL repo variable if you point the surface elsewhere.
on:
  schedule:
    # Daily 08:47 UTC — an off-the-hour minute clear of the other scheduled jobs
    # (bench-signal 08:03, scoreboard-feed 08:17, bench-feed 08:27; garden 06:23,
    # steering-guard 07:33, score-signal 07:41, gate-signal 07:53).
    - cron: "47 8 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Render the card but do NOT post"
        type: boolean
        default: true

permissions:
  contents: read
  issues: read

concurrency:
  group: capacity-feed
  cancel-in-progress: false

jobs:
  capacity-feed:
    name: capacity -> #capacity
    if: github.ref_name == 'main' || github.ref_name == 'master'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GOTOOLCHAIN: auto
      FAK_SCOREBOARD_TOKEN: ${{ secrets.FAK_SCOREBOARD_TOKEN }}
      FAK_CAPACITY_CHANNEL: ${{ vars.FAK_CAPACITY_CHANNEL || 'C0BDNU04JDP' }}
      FAK_SCOREBOARD_SOURCE: ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      # Summarize open GitHub issues — the public demand-pressure signal. `gh` ships
      # on the runner and authenticates with the built-in GITHUB_TOKEN. NO --search
      # date filter (documented unreliable / cap-limited); pull the open list once
      # and bucket locally.
      - name: summarize issue load
        id: load
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue list --state open --limit 2000 --json number,labels,createdAt > capacity-issues.json
          now=$(date +%s)
          count=$(jq 'length' capacity-issues.json)
          urgent=$(jq '[.[] | select(any(.labels[]?.name; test("^(P0|P1|priority[:/_-]?(0|1)|priority/P[01])$"; "i")))] | length' capacity-issues.json)
          new24=$(jq --argjson now "$now" '[.[] | select(($now - (.createdAt | fromdateiso8601)) <= 86400)] | length' capacity-issues.json)
          stale7=$(jq --argjson now "$now" '[.[] | select(($now - (.createdAt | fromdateiso8601)) >= 604800)] | length' capacity-issues.json)
          for v in count urgent new24 stale7; do
            eval "x=\$$v"
            case "$x" in ''|*[!0-9]*) eval "$v=0" ;; esac
          done
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "urgent=$urgent" >> "$GITHUB_OUTPUT"
          echo "new24=$new24" >> "$GITHUB_OUTPUT"
          echo "stale7=$stale7" >> "$GITHUB_OUTPUT"
          printf 'open=%s urgent=%s new24=%s stale7=%s\n' "$count" "$urgent" "$new24" "$stale7"

      # Map the public load signals onto a compact grade/verdict. Urgent P0/P1 work
      # pages first; otherwise backlog size drives the action threshold.
      - name: grade backlog
        id: grade
        run: |
          n="${{ steps.load.outputs.count }}"
          urgent="${{ steps.load.outputs.urgent }}"
          new24="${{ steps.load.outputs.new24 }}"
          stale7="${{ steps.load.outputs.stale7 }}"
          if   [ "$urgent" -ge 10 ]; then g=D; v=ACTION;
          elif [ "$urgent" -gt 0 ];  then g=C; v=ACTION;
          elif [ "$n" -lt 50 ];      then g=A; v=OK;
          elif [ "$n" -lt 120 ];     then g=B; v=OK;
          elif [ "$n" -lt 200 ];     then g=C; v=ACTION;
          else                            g=D; v=ACTION;
          fi
          score="${n} open; ${urgent} urgent; ${new24} new/24h; ${stale7} stale>7d"
          detail="demand pressure: open=${n}; urgent(P0/P1)=${urgent}; new24h=${new24}; stale>7d=${stale7}; node readiness posts in #node-usage"
          echo "grade=$g" >> "$GITHUB_OUTPUT"
          echo "verdict=$v" >> "$GITHUB_OUTPUT"
          echo "score=$score" >> "$GITHUB_OUTPUT"
          echo "detail=$detail" >> "$GITHUB_OUTPUT"
          echo "grade=$g verdict=$v score=$score"

      # Always render the card to the step summary (and as the artifact) so the run
      # is auditable even when nothing posts (missing secret / manual dry-run / fork).
      - name: render card (dry-run)
        run: |
          go run ./cmd/fak scoreboard post \
            --channel "$FAK_CAPACITY_CHANNEL" \
            --kpi capacity-demand \
            --value "${{ steps.grade.outputs.score }}" \
            --grade "${{ steps.grade.outputs.grade }}" \
            --verdict "${{ steps.grade.outputs.verdict }}" \
            --detail "${{ steps.grade.outputs.detail }}" \
            --source ci \
            --dry-run | tee capacity-card.txt
          {
            echo "## capacity-feed — demand pressure"
            echo '```'
            cat capacity-card.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # POST — only when the token secret is present. A manual dry_run also skips.
      - name: post to #capacity
        if: ${{ env.FAK_SCOREBOARD_TOKEN != '' && !(github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') }}
        run: |
          go run ./cmd/fak scoreboard post \
            --channel "$FAK_CAPACITY_CHANNEL" \
            --kpi capacity-demand \
            --value "${{ steps.grade.outputs.score }}" \
            --grade "${{ steps.grade.outputs.grade }}" \
            --verdict "${{ steps.grade.outputs.verdict }}" \
            --detail "${{ steps.grade.outputs.detail }}" \
            --source ci

      - name: note when posting was skipped
        if: ${{ env.FAK_SCOREBOARD_TOKEN == '' }}
        run: echo "FAK_SCOREBOARD_TOKEN not set — ran in dry-run; nothing posted. Add the secret to enable posting." >> "$GITHUB_STEP_SUMMARY"

      - name: upload card artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capacity-card
          path: |
            capacity-card.txt
            capacity-issues.json
          if-no-files-found: ignore
