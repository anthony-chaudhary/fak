version = "1.0"

[metadata]
difficulty = "very_hard"
category = "c-to-zig"
tags = ["zig", "c", "porting", "git", "systems-programming", "vcs"]

[agent]
timeout_sec = 72000.0

[verifier]
timeout_sec = 86400.0

[environment]
docker_image = "ghcr.io/proximal-labs/frontier-swe/git-to-zig:v4"
build_timeout_sec = 1800.0      # 30 minutes
cpus = 4
memory_mb = 16384
storage_mb = 30720
gpus = 0
allow_internet = false
mcp_servers = []
