# DOS workspace config -- fleet's own governance, dogfooded.
#
# fak IS an OS-for-agents (a "DOS"); this file turns the SAME kernel on the repo
# that builds it. Until now `dos doctor` saw fleet through trivial defaults: one
# `**/*` lane (so `dos arbitrate` treated the whole repo as a single tree -> max
# concurrency 1), a plans glob that matched none of fleet's plans, and no fleet
# ship grammar. This file replaces those with fleet's real shape, so the DOS loops
# (arbitrate / verify / next-up / self-improve / goal-gate) operate on the truth
# instead of a stub. The mechanism stays in the installed `dos` package; this is
# the only policy that crosses into the tree.
#
# SAFETY (this is a LIVE multi-session fleet): every table only makes DOS smarter
# about fleet -- real lanes, fleet's ship anchor, fleet's own invariants as refusal
# vocabulary. None of it introduces a spontaneous refusal: the custom [reasons.*]
# are DATA that fire only at the opt-in `dos apply` surface / their named floor.
# Validated with `dos doctor`, `dos verify` (recognizes a `(fak <leaf>)` trailer / a
# `fak/<leaf>:` ship within dos's 50-commit grep window -- re-run for the live witness
# sha, which drifts as the window advances), and `dos arbitrate` (two disjoint leaf
# lanes co-acquire) before commit.
workspace = "."

# Lane taxonomy -- a concurrent lane may run iff its file-tree is disjoint from
# every live lease; an exclusive lane runs alone. fak's architecture is a STAR of
# disjoint leaf trees (PARTITION.md: "dos-arbitrate takes one lease per tree"), and
# the arbiter keys concurrency on the LANE: two workers wanting the same named lane
# serialize even on disjoint sub-trees. So the honest partition is ONE LANE PER LEAF
# (matching the dos-kernel repo's own one-lane-per-dir convention) -- that is what
# lets the live fleet edit N leaves in parallel (e.g. a model-peer and an architest
# worker at once). The trees are prefix-based and pairwise disjoint by construction.
# `internal/abi` is the frozen, human-owned spine (PARTITION.md "wave-0, unleasable")
# -> EXCLUSIVE: an ABI change is the serial gate that every leaf imports.
[lanes]
concurrent = [
  "adjudicator", "agent", "agentdojo", "architest", "bench", "blob", "canon", "compute",
  "cachemeta",
  "cdb", "ctxmmu", "engine", "gateway", "ggufload", "grammar", "harvest", "ifc", "kernel",
  "kvmmu", "metrics", "model", "normgate", "plancfi", "policy", "preflight",
  "provenance", "recall", "registrations", "shipgate", "steward", "turnbench",
  "vdso", "witness",
  "cmd", "experiments", "docs", "tools", "visuals", "claude", "ci",
  "tokenizer",
  "contextq", "journal", "examples",
  "appversion", "boundarylint", "deletioncert", "demoui", "enginecache", "gpulease",
  "leakcheck", "metalgemm", "modelengine", "pathlint", "pathutil", "radixkv",
  "ratelimit", "rsiloop", "swebench", "toollint", "tracesink", "urllint", "webbench",
  "answershape",
  "codelint",
  "residency",
  # new-leaf:lane -- `python tools/new_leaf.py` inserts a generated leaf lane above
]
exclusive = ["abi", "release", "global"]
autopick = [
  "adjudicator", "agent", "agentdojo", "architest", "bench", "blob", "canon", "compute",
  "cachemeta",
  "cdb", "ctxmmu", "engine", "gateway", "ggufload", "grammar", "harvest", "ifc", "kernel",
  "kvmmu", "metrics", "model", "normgate", "plancfi", "policy", "preflight",
  "provenance", "recall", "registrations", "shipgate", "steward", "turnbench",
  "vdso", "witness",
  "cmd", "experiments", "docs", "tools", "visuals", "claude", "ci",
  "tokenizer",
  "contextq", "journal", "examples",
  "appversion", "boundarylint", "deletioncert", "demoui", "enginecache", "gpulease",
  "leakcheck", "metalgemm", "modelengine", "pathlint", "pathutil", "radixkv",
  "ratelimit", "rsiloop", "swebench", "toollint", "tracesink", "urllint", "webbench",
  "answershape",
  "codelint",
  "residency",
  # new-leaf:lane
]

# NOTE (2026-06-22, dos-effective-usage audit): these globs were prefixed
# `fak/internal/...` / `fak/cmd/...`, but the Go module is the REPOSITORY ROOT
# (AGENTS.md) -- the real tree is `internal/...` and `cmd/...` with NO `fak/`
# segment. So every glob below matched ZERO files, and the arbiter's disjointness
# rung was running on phantom trees: a worker editing the REAL path
# internal/gateway/server.go was ADMITTED against a peer holding the gateway lane
# (proven: `dos arbitrate --lane gateway --tree internal/gateway/server.go
# --leases '[{"lane":"x","tree":["fak/internal/gateway/**"]}]'` -> acquire; the
# same with the corrected `internal/gateway/**` lease -> refuse). The prefix is
# stripped to the real layout, and the leaves that existed in internal/ but had no
# lane are added, so arbitrate now actually detects same-tree collisions.
[lanes.trees]
adjudicator = ["internal/adjudicator/**"]
agent = ["internal/agent/**"]
agentdojo = ["internal/agentdojo/**"]
architest = ["internal/architest/**"]
bench = ["internal/bench/**"]
blob = ["internal/blob/**"]
