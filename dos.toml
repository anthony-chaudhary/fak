# Where fleet keeps the state DOS reads. fak/ carries no version constant; the bare
# `VERSION` file at the root is the single marker (.claude/project.yaml).
#
# Plan surface (2026-06-22, #517): the old `plans_glob = "PLAN-*.md"` matched ZERO
# files -- there is no `PLAN-*.md` (nor `BUILD-*.md`) at the repo root -- so every
# plan-facing surface (`dos next-up`, `dos replan`, the class-cycle/lifecycle skills)
# resolved a phantom empty set while the config advertised a plan surface that does
# not exist. The real plan-shaped docs live under `docs/**/*-plan.md` (e.g.
# docs/serving/dual-track-serving-plan.md, docs/explainers/video-content-plan.md),
# which is also dos 0.28.0's built-in default glob -- so this points the key at the
# surface that actually exists, and `dos next-up` / `dos replan` now resolve a
# NON-EMPTY set. There is still no `[lifecycle]` table (no in-tree lifecycle phase
# machinery runs), so the lifecycle path stays intentionally inert; add one only when
# a real lifecycle surface lands.
[paths]
plans_glob = "docs/**/*-plan.md"

# How fleet stamps a shipped phase in commit subjects. Releases use the UNIVERSAL
# "vX.Y.Z:" anchor which dos correctly classifies as a release-bump (not a phase
# ship); per-leaf ships read "fak/<leaf>: ...". subject_dirs = [] keeps the generic
# dir-free shape so `verify` never MISSES a fleet ship by over-requiring a prefix --
# confirmed: `dos verify fak <leaf>` -> SHIPPED (source=grep-subject) for any leaf
# shipped within dos's 50-commit grep window -- e.g. `dos verify fak tools` -> SHIPPED
# ce2c2f3 (2026-06-21). A witness sha frozen in this comment necessarily goes stale once
# its ship scrolls out of the window (which is why an older pinned sha here drifts dead);
# re-run the command for the live witness rather than trusting a sha pinned in prose.
#
# trailer_stamp = true (docs/289): ALSO bind the Conventional-Commits subject the
# fleet actually writes -- `feat(scope): ... (fak <leaf>)` / `fix(scope): ...
# (fak <leaf>)`. Fleet has standardized on `type(scope):` subjects (32/50 of recent
# commits; 0 use the legacy `fak/<leaf>:` start-prefix), so without this `dos verify`
# / the goal-gate referee bind NOTHING in the fresh window -- `dos doctor` reported
# "none of your last 50 commits name a unit of work" (DOS-INSTALL-AUDIT-2026-06-19).
# This recognizes a `(fak <leaf>)` trailer at the END of the subject as a direct ship
# of leaf <leaf>; it is purely ADDITIVE (the legacy `fak/<leaf>:` start-form still
# binds via the direct rung) and introduces NO spontaneous refusal. The trailer is
# exactly as forgeable as the start-prefix, so the rung grades it `grep-subject` the
# same way. Verified in-process against the real oracle: `fix(gateway): ... (fak
# gateway)` -> SHIPPED via trailer (47c010c); a bare `fix(gateway): ...` with no
# trailer stays NOT_SHIPPED (an un-stamped commit is not a forgeable ship). The
# commit-side half of this convention lives in CLAUDE.md / AGENTS.md.
[stamp]
style         = "grep"
subject_dirs  = []
trailer_stamp = true

# Standing supervisor policy for the generic DOS population loop. Fleet has a
# static, disjoint lane roster, so a target of three is reachable without the
# dynamic-claim `max_concurrency` budget the job repo uses. The worker is
# launched through a backend-selector shim (tools/dispatch_worker.py) so the
# fleet can run a MIX of Claude and opencode workers behind one template: the
# shim defaults to Claude (the dos-kernel plugin skill `/dos-kernel:dos-*`) and
# switches to opencode (the `.opencode/agent/dos-dispatch.md` worker) when
# FLEET_WORKER_BACKEND=opencode is set on a node. The Claude launch shape lives
# in the shim and is kept byte-identical to the historical direct template.
[supervise]
# target = 0 (2026-06-22, #517): NOTHING in-repo keeps a standing loop alive on the
# live path, so a target of 4 was aspirational, not enforced -- zero loops are actually
# kept alive. `dos loop` WITHOUT `--enact` is emit-only (it only PRINTS the
# worker_launch_template below); `dos loop --enact` DOES Popen it, but nothing in-repo
# arms a standing `--enact` loop, and the in-tree watchdog hardcodes its own argv (see
# the NOTE under the template). Lowered to 0 so the declared count matches what is
# actually kept alive. The keep-alive ARMING that would make a non-zero target real is
# tracked in #20; raise this back to the desired standing-loop count when that lands.
target = 0
# NOTE (cutover 2026-06-24): this template now names the interpreter-free Go launcher
# cmd/dispatchworker (`make build` drops it at tools/.bin/dispatchworker), retiring the
# bare-`python` token that ENOENTed on python3-only nodes (#22). `dos loop` WITHOUT
# `--enact` only PRINTS this; `dos loop --enact` Popens it (`dos loop --help`: "Popen
# each SPAWN via [supervise].worker_launch_template"), so the launcher IS on the --enact
# exec path -- hence the Go binary. The other live spawner,
# tools/dos_supervisor_watchdog.py:enact_command, likewise prefers the Go binary and
# falls back to dispatch_worker.py via sys.executable when it is not built, so a node
# without the binary still dispatches. The cutover is launcher-AGNOSTIC for worker
# detection: dispatch_preflight.py counts the `dos-dispatch-loop` marker on the spawned
# `claude -p` worker (identical whichever launcher started it), and dispatch_status /
# fleet_dos_dispatch_watchdog key on run-dir PIDs and the `loop`/`--enact` supervisor
# markers -- none key on the launcher's own name, so the double-spawn guard is unchanged.
# A node that runs `--enact` must `make build` first (relative path, resolved from the
# workspace). See docs/MULTINODE-DOS-FAK-CROSSOVER-2026-06-20.md.
worker_launch_template = 'tools/.bin/dispatchworker --lane {lane}'

# Dogfood: fleet's OWN architectural invariants, declared as DOS refusal vocabulary
# (DATA -- no kernel edit), each with a deterministic floor that already runs in CI.
# This is the whole repo turned on itself: a change that breaks the layering or the
# typed-core direction is refusable with a structured, citable reason from a closed
# set, not free-text -- the same discipline fak imposes on tool results. The floor
# under each is the architest gate (`go test ./internal/architest`).
[reasons.LOOP_DONE_UNWITNESSED]
category = "STALE_CLAIM"
refusal  = true
summary  = "A loop turn claimed done, but the configured external witness did not corroborate the done effect from non-agent-authored evidence."
fix      = "Re-arm the loop with this reason as feedback, make the next turn satisfy the goal's witness criterion (commit-audit, verify, test-witness, or a registered witness), then re-check the gate."
see_also = ["internal/loopgate", "dos commit-audit", "dos verify", "dos test-witness", "dos witness"]

[reasons.STALE_RECALL]
category = "STALE_CLAIM"
refusal  = true
summary  = "A dev-ex loop is about to act on recalled status or plan memory whose backing witness is stale relative to the current git/ledger source of truth."
fix      = "Refresh from the source witness (`dos status`, `dos verify`, `dos commit-audit`, or the current git ref), discard the stale recall, then retry with the refreshed digest."
see_also = ["dos status", "dos verify", "dos commit-audit", "docs/goal-spec.md"]

[reasons.COLLISION_RISK]
category = "OPERATOR_GATE"
refusal  = true
summary  = "A dispatch or worker launch would overlap a live lease/region and risks two agents mutating the same file tree concurrently."
fix      = "Run the arbiter and wait, repartition, or pick a disjoint lane/region before launching. Floor: `dos arbitrate` / lane lease checks."
see_also = ["dos arbitrate", "dos top", "tools/dos_fleet_lease.py"]

[reasons.GATE_LATENCY_REGRESSION]
category = "OPERATOR_GATE"
refusal  = true
summary  = "A guard or DOS gate grew slow enough to threaten the loop's dev-ex latency budget, so the loop should not normalize the regression as healthy."
fix      = "Measure the gate with the relevant hook/status benchmark, fix or budget the added latency, and rerun before claiming the loop is healthy."
see_also = ["tools/dos_hook_bench.py", "docs/perf-dos-hook-cost.md", "dos status"]

[reasons.RUN_STATUS_CLAIMED_FIELD]
category = "STALE_CLAIM"
refusal  = true
summary  = "`dos status` returned a run digest containing a `claimed` field, violating the witnessed-status contract that peers read liveness/progress from evidence only."
fix      = "Fix the status producer so the digest contains only liveness, ledger-verified progress, lease region, and resume evidence; do not consume claimed status."
see_also = ["dos status", "tools/dispatch_status.py"]

[reasons.ARCH_LAYER_VIOLATION]
category = "OPERATOR_GATE"
refusal  = true
summary  = "change breaks the layered-DAG import contract (an upward/cross-tier import, or a new leaf with no declared tier)"
fix      = "invert the dependency through a registration seam or push the shared type down a layer; declare a new leaf's tier in internal/architest (or run `python tools/new_leaf.py`). Floor: `.\\fak\\test.ps1 ./internal/architest/`"
see_also = ["fak/internal/architest/architest_test.go", "fak/ARCHITECTURE.md", "fak/GROWTH.md"]

[reasons.OUT_OF_DIRECTION]
category = "OPERATOR_GATE"
refusal  = true
summary  = "request-path logic in an untyped language, or a non-Go package blank-imported into the kernel (DIRECTION.md)"
fix      = "keep the request path Go-only; a non-Go seam must be off-path and cross a typed, re-validated boundary. Floor: architest TestHotPathHasNoExec"
see_also = ["fak/DIRECTION.md", "fak/internal/architest/architest_test.go"]

# Trunk discipline: work lands directly on `main` as a SINGLE working tree, not on
# stray feature branches / per-issue worktrees. This is the cross-agent "stay on the trunk"
# policy turned into DOS vocabulary -- the same structured-reason discipline fak imposes
# on tool results, aimed at the fleet's own git workflow so Claude, Codex, and humans
# share ONE refusal instead of three doc sentences that only one of them reads. The named
# floor is the git hook (tools/githooks/reference-transaction), which fires below the
# agent layer; `python tools/install_trunk_guard.py` activates it per clone.
[reasons.OFF_TRUNK]
category = "OPERATOR_GATE"
refusal  = true
summary  = "work landed off the trunk -- a new branch or worktree was created instead of committing directly to main (the single-tree-on-trunk operator law). Every worker MUST stay on main in the main worktree; creating a side branch/worktree to route around a dirty or diverged tree is the specific anti-pattern this reason names."
fix      = "commit directly to main with small, path-scoped commits; pull/merge frequently, preferring merge or pull --no-rebase when unrelated dirty files are present. `git commit -- <paths>` and merge never need a clean tree, so a worktree is never required to ship -- a dirty/diverged tree means WAIT or merge in place, never escape into a side tree; if you truly cannot proceed on main, STOP and surface the blocker. Floor: tools/githooks/reference-transaction blocks off-trunk branch creation by default; set FLEET_TRUNK_GUARD=warn for advisory mode, or FLEET_ALLOW_BRANCH=1 to override once (release tooling only)."
see_also = ["CLAUDE.md", "AGENTS.md", "tools/githooks/reference-transaction", "tools/install_trunk_guard.py"]

# Stale-base deletion: a `git commit -- <path>` (or `fak commit`) stages the
# WORKING-TREE copy of exactly the named pathspec, so a stale whole-file base
# SILENTLY drops a peer's pushed block even on a pure-add change. The content-level
# merge-base guard in internal/safecommit (FAK_STALE_BASE_GUARD=block|warn|off)
# refuses with this reason when the committed blob would delete a contiguous
# peer-added run present on origin/<trunk> but absent from the working tree.
[reasons.STALE_BASE_DELETION]
category = "OPERATOR_GATE"
refusal  = true
summary  = "a pathspec commit would silently drop a peer's pushed block -- the working-tree copy of the named path is stale relative to origin/<trunk>, so committing it deletes a contiguous peer-added run the local change never touched"
fix      = "fetch + rebase/merge origin/<trunk> so the working-tree base includes the peer's block, then re-commit; never escape into a side tree. FAK_STALE_BASE_GUARD=warn for advisory mode, =off to disable. Floor: internal/safecommit checkStaleBaseDeletion (fail-open on a fresh base / absent ref)."
see_also = ["fak/internal/safecommit/stalebase.go", "fak/CLAUDE.md", "fak/AGENTS.md"]

# Public-copy leak scan: the private canonical repo is the source for every
# future public export, so the redact-needles listed in PUBLIC-SCRUB-POLICY.md
# (operator Tailscale IPs, SSH user, machine paths, the .claude-agent-*
# config dir, the Go-module codename, operator hostnames, sibling-repo
# working-copy paths) must never enter THIS history in the first place. The
# named floor is the git hook (tools/githooks/pre-commit), which fires below
# the agent layer; `python tools/install_trunk_guard.py` activates it alongside
# the trunk guard. The export-time scrubber (tools/scrub_public_copy.py) is
# defense-in-depth; this hook is the primary gate.
[reasons.PUBLIC_LEAK]
category = "OPERATOR_GATE"
refusal  = true
summary  = "staged content matches a redact-needle -- operator-private info would enter the repo's history (the source for every public export)"
fix      = "remove the needle from the staged change, or redact it per PUBLIC-SCRUB-POLICY.md. Floor: tools/githooks/pre-commit blocks the commit by default; set FLEET_SCRUB_GUARD=warn for advisory mode, or FLEET_ALLOW_LEAK=1 to override once (only for new fake adversarial fixtures that intentionally trip a needle)."
see_also = ["PUBLIC-SCRUB-POLICY.md", "tools/githooks/pre-commit", "tools/scrub_public_copy.py", "tools/install_trunk_guard.py", "tools/check_committed_files.py"]

# File-admission gate: a staged path is PRIVATE-ONLY content that must never enter the
# PUBLIC tree -- the operator's lab GPU-server connection subsystem (cmd//internal/ *dgx*
# packages, cmd/slackgc) lives ONLY in the fak-private companion repo -- or it is
# regenerable junk (caches, compiled binaries, logs, demo output) or an oversized blob a
# forever-history public tree should not carry. This is the COMMIT-TIME, content-placement
# sibling of PUBLIC_LEAK (and of the write-time OUT_OF_TREE_WRITE below): the SAME
# public/private boundary, enforced on WHAT a path is rather than WHERE it resolves. Named
# floor: the git hook tools/githooks/pre-commit -> tools/check_committed_files.py, which also
# runs tree-wide in CI (--audit-tree).
[reasons.FILE_ADMISSION]
category = "OPERATOR_GATE"
refusal  = true
summary  = "a staged path must not enter the PUBLIC tree -- it is private-only content (the lab GPU-connection subsystem cmd//internal/ *dgx* / cmd/slackgc, which lives only in fak-private), regenerable junk (cache/compiled/log/demo-output), or an oversized blob"
fix      = "move private-only code to the fak-private companion repo; drop regenerable junk (it rebuilds) or gitignore it; put real data under experiments/ or testdata/; trim an oversized blob or use Git LFS. Floor: tools/githooks/pre-commit blocks the commit by default; set FLEET_FILE_GUARD=warn for advisory mode, or ALLOW_STRAY_FILE=1 to override once."
see_also = ["tools/check_committed_files.py", "tools/githooks/pre-commit", "PUBLIC-SCRUB-POLICY.md", "tools/repo_guard.py"]

# Out-of-tree write guard: a destructive/write op that escapes the repo into a
# SIBLING tree. work/ holds many sibling repos (fak/, fak-private/, fleet/, dos/,
# tools/, ...); a tool resolving a path one level too high writes into ANOTHER
# project. Born 2026-06-21: a build script wrote fak.exe into the sibling
# anthony-chaudhary/tools repo, which was then rm -rf'd. The named floor is a
# PreToolUse hook (not a commit-time hook like the reasons above) -- it fires
# BELOW the agent, before the tool runs. tools/repo_guard.py resolves every
# destructive/write target against the repo root and denies the out-of-tree ones
# (allow-listing the OS temp dir + ~/.cache); the FAK regex twin is
# examples/repo-guard-policy.json. Like the others this is purely ADDITIVE data:
# the hook fires only on a target that lands outside the workspace, so no in-repo
# work is ever refused; soften with FAK_REPO_GUARD=warn or off.
[reasons.OUT_OF_TREE_WRITE]
category = "OPERATOR_GATE"
refusal  = true
summary  = "a destructive or write op targets a path OUTSIDE this repo -- it would create / delete / overwrite inside a SIBLING tree (another project or git repo) or the workspace's parent, not the workspace itself"
fix      = "operate inside the workspace; send scratch to a temp dir (/tmp, ~/.cache), never a sibling. Floor: tools/repo_guard.py (a Claude Code PreToolUse hook in .claude/settings.json) resolves each target against the repo root and denies out-of-tree ones; set FAK_REPO_GUARD=warn for advisory, off to disable. FAK regex twin: examples/repo-guard-policy.json."
see_also = ["tools/repo_guard.py", "examples/repo-guard-policy.json", ".claude/settings.json", "DOGFOOD-CLAUDE.md", "tools/check_committed_files.py"]

# L3 cross-tenant prefix-share gate (#57): the two typed REFUSE reasons the read-path
# admission gate (internal/gateway/l3share.go -> AdmitL3SharedPage) cites when it refuses
# a cross-tenant L3 page. fak rides the control/admission path in FRONT of the external L3
# store's `mget`: that store is semantics-free (trusts the client hash, no content verify,
# no tenancy notion), so fak supplies the two rungs it structurally cannot -- G1 full
# content-verify and G4 scope/capability. Declared here so the tokens are CLOSED
# (validateable via `dos_check_reason`), DISTINCT (a collision is distinguishable from an
# access denial), and refusable -- the issue's "two REFUSE reasons are distinct, closed
# tokens" acceptance. Floor: `go test ./internal/gateway -run TestL3Share`.
[reasons.L3_CROSS_TENANT_SCOPE_DENIED]
category = "OPERATOR_GATE"
refusal  = true
summary  = "G4 scope rung: a cross-tenant reader asked for an L3 page whose ShareScope does not reach across the trust boundary -- a page private to one agent (ScopeAgent) or bound to the owner's tenant (ScopeTenant), fetched by a DIFFERENT tenant. A capability check, not a namespace-prefix match."
fix      = "the page is not shareable across tenants; only an owner-marked fleet/public (ScopeFleet) page crosses the boundary. Mark the prefix ScopeFleet at the producer if it is genuinely public, or serve the reader its own tenant-scoped page. Floor: go test ./internal/gateway -run TestL3Share_CrossTenant."
see_also = ["internal/gateway/l3share.go", "internal/abi/types.go", "L3-DISAGGREGATED-CACHE-REIMAGINED.md"]

[reasons.L3_PAGE_DIGEST_MISMATCH]
category = "OPERATOR_GATE"
refusal  = true
summary  = "G1 verify rung: the bytes the L3 get returned do not hash to the digest the page CLAIMS (Ref.Digest) -- a hash collision or a mis-tag the semantics-free store cannot detect. Refused for EVERY reader, same-tenant included: a corrupt/ambiguous page is served to no one. A full-content digest recompute, not a truncated locality hash."
fix      = "do not admit the page -- the content address does not match its bytes. Re-fetch / re-key at the store, or re-mint the page so its Ref.Digest is the true hex(sha256) of its content. Floor: go test ./internal/gateway -run TestL3Share_DigestMismatch."
see_also = ["internal/gateway/l3share.go", "internal/abi/types.go", "internal/model/evict_test.go"]

# Self-tax overhead budget breach (#1150, epic #1147 T2): the closed-vocabulary token a
# per-rung/per-method overhead breach names. The plane declares an EXPECTED overhead
# envelope per lifecycle rung (internal/turntaxmeter overheadbudget.go -- a generous,
# scope-stated ceiling, not a measured p99); a span over its declared ns/token envelope
# reads back as THIS token rather than free-text prose, reusing the same closed-set
# discipline as the refusal vocabulary so a breach is emittable, verifiable, and
# refusable. A budget is an envelope with a stated scope, NOT a promise of zero cost: a
# rung that costs more but SAVES more is a net win, so the gate's red/green is a
# net-of-savings decision (epic T6), not this single-rung breach alone.
# Floor: `go test ./internal/turntaxmeter -run TestOverBudgetSpanReadsBackAsBreach`.
[reasons.OVERHEAD_BUDGET_EXCEEDED]
category = "OPERATOR_GATE"
refusal  = true
summary  = "A lifecycle rung's measured overhead (elapsed ns or tokens added) exceeded its declared per-rung/per-method budget envelope -- the 'expected' baseline a breach is defined against. The witness gate is subprocess-bound (it spawns git) and carries a deliberately wide envelope so a slow disk does not read as a kernel regression."
fix      = "Confirm the breach against the rung's declared envelope (internal/turntaxmeter.DefaultBudget); if it is a real regression, fix or re-budget the added overhead; if the rung also SAVES more than it costs, the net line (epic T6) decides red/green, not this single breach. Floor: go test ./internal/turntaxmeter."
see_also = ["internal/turntaxmeter/overheadbudget.go", "docs/notes/self-tax-performance-assurance-tracking-1147.md", "GATE_LATENCY_REGRESSION"]

# Verification-ladder INDETERMINATE (#1210, C2/G2 of the agent-programming-grammar
# epic #1208): the first-class verdict the declarable verification ladder
# (docs/standards/verification-ladder-spec.md) folds to when a cheap rung could NOT
# conclusively decide and the ladder exhausted without a costlier rung resolving it.
# It is the kernel's shipped VerdictIndeterminate (internal/abi/types.go,
# FoldRank 15 between Defer and Transform in internal/abi/registry.go; the lazy fold
# in internal/kernel/kernel.go makes it non-committable -- a residual Indeterminate
# yields Deny) lifted into the closed REFUSAL vocabulary so a ladder's fail-closed
# deny carries a dos_check_reason-validatable token instead of free text. Distinct
# from a fail-open allow and from a bare DEFAULT_DENY abstention: it names "I could
# not decide cheaply; the costlier rung was unavailable, so fail closed -- escalate,
# never silently allow." Pure DATA: it introduces no spontaneous refusal, it only
# gives the ladder's existing fail-closed tail a checkable name.
[reasons.INDETERMINATE]
category = "OPERATOR_GATE"
refusal  = true
summary  = "Verification-ladder rung could not CONCLUSIVELY decide the claim cheaply and the ladder exhausted with no costlier rung available -- the residual indeterminate folds to a fail-closed deny (escalate, never silently allow). The kernel-side VerdictIndeterminate (internal/abi/types.go) is non-committable by construction; this token names the ladder's fail-closed tail."
fix      = "Consult a costlier rung that can conclusively decide (require-witness / CI / git-evidence / isolated-worktree keep-bit / human ESCALATE), or accept the fail-closed deny. The ladder is DATA: declare a sufficient rung whose max_risk covers the claim's risk class in the dos.toml [ladder] (docs/standards/verification-ladder-spec.md). Floor: go test ./internal/kernel (the shipped lazy fold + residual-Indeterminate-fails-closed)."
see_also = ["docs/standards/verification-ladder-spec.md", "docs/notes/verification-ladder-doctrine.md", "internal/abi/types.go", "internal/kernel/kernel.go"]

# Bound the per-project `.dos/` scratch so a long-lived repo doesn't accrete audit
# reports without limit (the "never reap a live lease" floor is the collector's,
# independent of this number).
[retention]
audits_keep_last = 30
