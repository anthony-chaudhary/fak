cdb = ["fak/internal/cdb/**"]
ctxmmu = ["fak/internal/ctxmmu/**"]
engine = ["fak/internal/engine/**"]
gateway = ["fak/internal/gateway/**"]
ggufload = ["fak/internal/ggufload/**"]
grammar = ["fak/internal/grammar/**"]
harvest = ["fak/internal/harvest/**"]
ifc = ["fak/internal/ifc/**"]
kernel = ["fak/internal/kernel/**"]
kvmmu = ["fak/internal/kvmmu/**"]
metrics = ["fak/internal/metrics/**"]
